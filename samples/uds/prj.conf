CONFIG_CAN=y

CONFIG_UDS=y

CONFIG_LOG=y
CONFIG_LOG_INFO_COLOR_GREEN=y

CONFIG_HEAP_MEM_POOL_SIZE=1024
CONFIG_STD_C17=y

CONFIG_GPIO=y

# used for generating a seed for the security access function
CONFIG_TEST_RANDOM_GENERATOR=y 

# Enable filesystem support for UDS file transfer tests
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Enable mbedTLS for cryptographic functions in the  UDS authentication function
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
# PSA Crypto API provider (authentication.c uses psa_* directly; the legacy
# mbedtls_aes_*/ctr_drbg_*/entropy_* API was removed from the public surface
# in Mbed TLS 4.x)
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
# AES-128 ECB used by aes_encrypt_ecb()/aes_decrypt_ecb()
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ALG_ECB_NO_PADDING=y
# DRBG + entropy back the PSA RNG used by psa_generate_random()
CONFIG_MBEDTLS_CTR_DRBG_C=y
CONFIG_MBEDTLS_ENTROPY_C=y

# mbedtls needs more stack
CONFIG_ISO14229_THREAD_STACK_SIZE=4096